<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TOTP / 2FA 验证码生成器</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f7fa;
  color:#222;
  padding:20px;
}
@media (prefers-color-scheme: dark){
  body{
    background:#1a1a22;
    color:#eee;
  }
}
.box{
  width:100%;
  max-width:540px;
  background:#fff;
  padding:32px;
  border-radius:18px;
  box-shadow:0 10px 35px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark){
  .box{
    background:#272733;
  }
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}

/* ========== 默认布局：电脑、平板、手机横屏（原版一行4栏） ========== */
.row-four{
  display:flex;
  gap:12px;
  margin-bottom:22px;
  width:100%;
}
.col-algo{flex:2.2;}
.col-digits{flex:1;}
.col-period{flex:1;}
.col-offset{flex:1;}

.input-item{
  width:100%;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
input,select{
  width:100%;
  padding:13px 16px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
  background:transparent;
  color:inherit;
}
@media (prefers-color-scheme: dark){
  input,select{
    border-color:#444;
  }
}
.secret-row{
  display:flex;
  gap:12px;
  margin-bottom:30px;
  align-items:flex-end;
}
.secret-input{
  flex:1;
}
.code-row{
  display:flex;
  gap:16px;
  align-items:center;
  margin-bottom:12px;
}
.code-current{
  flex:1;
  font-size:52px;
  font-weight:700;
  text-align:center;
}
.btn{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}
.btn-blue{ background:#409eff; color:#fff; }
.btn-gray{ background:#909399; color:#fff; }
.btn-red{ background:#f56c6c; color:#fff; }
.progress-bar{
  height:7px;
  width:100%;
  background:#e5e7eb;
  border-radius:4px;
  overflow:hidden;
  margin-bottom:10px;
}
@media (prefers-color-scheme: dark){
  .progress-bar{ background:#3a3a48; }
}
.progress-inner{
  height:100%;
  width:100%;
  background:#409eff;
  transition:width 1s linear;
}
.next-txt{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  opacity:0.75;
  margin-bottom:30px;
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
}

/* ========== 仅手机竖屏才启用新布局：宽度≤767px + 竖屏 ========== */
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .box{
    padding:24px 20px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  /* 四参数改为2×2网格 */
  .row-four{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
    margin-bottom:20px;
  }
  .col-algo,.col-digits,.col-period,.col-offset{
    flex:none;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  input,select{
    padding:12px 14px;
    font-size:16px;
  }
  /* 密钥行改为上下堆叠 */
  .secret-row{
    flex-direction:column;
    align-items:stretch;
    gap:10px;
    margin-bottom:26px;
  }
  /* 验证码+按钮上下排列 */
  .code-row{
    flex-direction:column;
    gap:12px;
  }
  .code-current{
    font-size:clamp(36px,12vw,52px);
    letter-spacing:4px;
  }
  .btn{
    width:100%;
  }
  .next-txt{
    font-size:clamp(18px,5vw,22px);
    margin-bottom:24px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<div class="box">
  <h2>TOTP / 2FA 验证码生成器</h2>

  <div class="row-four">
    <div class="input-item col-algo">
      <label>哈希算法</label>
      <select id="hashAlgo">
        <option value="SHA-1">SHA-1 (谷歌默认)</option>
        <option value="SHA-256">SHA-256</option>
        <option value="SHA-512">SHA-512</option>
      </select>
    </div>
    <div class="input-item col-digits">
      <label>验证码位数</label>
      <select id="digits">
        <option value="6">6位</option>
        <option value="8">8位</option>
      </select>
    </div>
    <div class="input-item col-period">
      <label>周期(秒)</label>
      <select id="period">
        <option value="30">30</option>
        <option value="60">60</option>
      </select>
    </div>
    <div class="input-item col-offset">
      <label>时钟偏移</label>
      <input id="timeOffset" type="number" value="0">
    </div>
  </div>

  <div class="secret-row">
    <div class="input-item secret-input">
      <label>Base32 密钥 Secret</label>
      <input id="secret" placeholder="粘贴密钥，自动过滤空格">
    </div>
    <button class="btn btn-gray" id="genRandom">随机生成</button>
  </div>

  <div class="code-row">
    <div class="code-current" id="currentCode">------</div>
    <button class="btn btn-blue" id="copyCode">复制</button>
  </div>

  <div class="progress-bar">
    <div class="progress-inner" id="progressBar"></div>
  </div>
  <div class="next-txt" id="nextCode">下一码：------</div>

  <div class="tip">纯html全部运算在本地浏览器，密钥不会上传服务器；<br>兼容Google Authenticator、Authy、Microsoft Authenticator、Aegis、2FAS、1Password、Bitwarden等所有TOTP类两步验证软件均可通用。 </div>
</div>

<script>
const BASE32_ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

function cleanSecret(s) {
  return s.toUpperCase().replace(/[\s\-=]/g, '');
}

function base32Decode(raw) {
  const s = cleanSecret(raw);
  let bits = '';
  for (const c of s) {
    const idx = BASE32_ALPHABET.indexOf(c);
    if(idx === -1) throw new Error("非法字符");
    bits += idx.toString(2).padStart(5, '0');
  }
  const byteStr = bits.match(/.{8}/g) || [];
  return Uint8Array.from(byteStr.map(b => parseInt(b, 2)));
}

function randomBase32(len = 16) {
  let res = '';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) {
    res += BASE32_ALPHABET[arr[i] % 32];
  }
  return res;
}

async function calcTOTP(secret, algo, digits, periodSec, offsetMs = 0, customTs = null) {
  const keyBytes = base32Decode(secret);
  const ts = customTs ?? (Date.now() + offsetMs);
  const step = Math.floor(ts / (periodSec * 1000));

  const counterBuf = new ArrayBuffer(8);
  const dv = new DataView(counterBuf);
  dv.setBigUint64(0, BigInt(step), false);
  const counter = new Uint8Array(counterBuf);

  const cryptoKey = await crypto.subtle.importKey(
    'raw', keyBytes, { name: 'HMAC', hash: algo }, false, ['sign']
  );
  const hmacRaw = await crypto.subtle.sign('HMAC', cryptoKey, counter);
  const hmac = new Uint8Array(hmacRaw);

  const offset = hmac[hmac.length - 1] & 0x0F;
  const binCode = ((hmac[offset] & 0x7F) << 24)
    | (hmac[offset + 1] << 16)
    | (hmac[offset + 2] << 8)
    | hmac[offset + 3];
  const mod = 10 ** digits;
  return (binCode % mod).toString().padStart(digits, '0');
}

let refreshTimer;
function getConfig() {
  return {
    secret: document.getElementById('secret').value,
    algo: document.getElementById('hashAlgo').value,
    digits: parseInt(document.getElementById('digits').value),
    period: parseInt(document.getElementById('period').value),
    offset: parseInt(document.getElementById('timeOffset').value) * 1000
  };
}

async function refreshView() {
  const cfg = getConfig();
  const now = Date.now() + cfg.offset;
  const stepMs = cfg.period * 1000;
  const remain = stepMs - (now % stepMs);
  const pct = (remain / stepMs) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  const codeBox = document.getElementById('currentCode');
  const nextBox = document.getElementById('nextCode');

  if (!cfg.secret.trim()) {
    codeBox.innerText = '------';
    nextBox.innerText = '下一码：------';
    return;
  }
  try {
    const curr = await calcTOTP(cfg.secret, cfg.algo, cfg.digits, cfg.period, cfg.offset);
    const nextTs = now + remain + 100;
    const next = await calcTOTP(cfg.secret, cfg.algo, cfg.digits, cfg.period, cfg.offset, nextTs);
    codeBox.innerText = curr;
    nextBox.innerText = `下一码：${next}`;
  } catch (e) {
    codeBox.innerText = '密钥错误';
    nextBox.innerText = '下一码：------';
  }
}

document.getElementById('genRandom').onclick = () => {
  document.getElementById('secret').value = randomBase32(16);
  refreshView();
};

document.getElementById('copyCode').onclick = async () => {
  const code = document.getElementById('currentCode').innerText;
  if (/^\d{6,8}$/.test(code)) {
    await navigator.clipboard.writeText(code);
    alert('已复制验证码');
  }
};

['secret','hashAlgo','digits','period','timeOffset'].forEach(id => {
  document.getElementById(id).oninput = refreshView;
});

refreshView();
refreshTimer = setInterval(refreshView, 1000);
</script>
</body>
</html>
